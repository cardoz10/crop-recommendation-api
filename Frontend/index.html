<!DOCTYPE html>
<html>
<head>
    <title>Recomendación de Cultivos</title>
    <meta charset="UTF-8">
</head>
<style>
body {
    background-color: #f0f8ff;
    font-family: Arial;
    text-align: center;
}

h2 {
    color: #2e7d32;
}

input {
    padding: 8px;
    margin: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #45a049;
}

#resultado {
    margin-top: 20px;
    font-size: 20px;
    color: #1b5e20;
}
</style>
<h2>Predicción de Cultivo 🌱</h2>

<input id="N" placeholder="Nitrógeno"><br><br>
<input id="P" placeholder="Fósforo"><br><br>
<input id="K" placeholder="Potasio"><br><br>
<input id="temperature" placeholder="Temperatura"><br><br>
<input id="humidity" placeholder="Humedad"><br><br>
<input id="ph" placeholder="pH"><br><br>
<input id="rainfall" placeholder="Lluvia"><br><br>

<button onclick="predictRF()">Predecir RandomForest</button>
<button onclick="predictSVM()">Predecir SVM</button>

<h3 id="resultado"></h3>

<script>
const API_URL = "https://crop-api-abc.onrender.com";

function getData(){
    return {
        N: parseFloat(document.getElementById("N").value),
        P: parseFloat(document.getElementById("P").value),
        K: parseFloat(document.getElementById("K").value),
        temperature: parseFloat(document.getElementById("temperature").value),
        humidity: parseFloat(document.getElementById("humidity").value),
        ph: parseFloat(document.getElementById("ph").value),
        rainfall: parseFloat(document.getElementById("rainfall").value)
    }
}

function predictRF(){
    fetch(API_URL + "/predict/rf", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(getData())
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("resultado").innerText =
            "RF: " + data.cultivo;
    });
}

function predictSVM(){
    fetch(API_URL + "/predict/svm", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(getData())
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("resultado").innerText =
            "SVM: " + data.cultivo;
    });
}
</script>

</body>
</html>
